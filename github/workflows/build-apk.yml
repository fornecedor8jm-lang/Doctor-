name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 33
        build-tools: '33.0.2'
        components: platform-tools,build-tools;33.0.2,platforms;android-33

    - name: Install dependencies
      run: npm ci

    - name: Build web app
      run: npm run build

    - name: Add Android platform
      run: npx cap add android

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Prepare keystore (from secret)
      if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
      run: |
        mkdir -p android/app
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
        echo "Keystore restored at android/app/release.keystore"
      shell: bash

    - name: Build APK (Release)
      id: build_release
      if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
      working-directory: android
      run: |
        chmod +x ./gradlew
        if [ -f app/release.keystore ]; then
          echo "Found keystore — building signed release APK"
          ./gradlew assembleRelease -PkeystoreFile=app/release.keystore -PkeystorePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} -PkeyAlias=${{ secrets.ANDROID_KEY_ALIAS }} -PkeyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
        else
          echo "No keystore found — building unsigned release APK"
          ./gradlew assembleRelease
        fi

    - name: Build APK (Debug)
      id: build_debug
      if: github.event_name == 'pull_request'
      working-directory: android
      run: |
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Upload Release APK
      if: steps.build_release.outcome == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: app-release-${{ github.sha }}.apk
        path: android/app/build/outputs/apk/release/app-release.apk

    - name: Upload Debug APK
      if: steps.build_debug.outcome == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-${{ github.sha }}.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Dump APK outputs (on failure)
      if: failure()
      run: |
        echo "===== Build outputs ====="
        ls -R android/app/build/outputs || true

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android/app/build/outputs/apk/release/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create/Update latest Release (for direct download)
      if: steps.build_release.outcome == 'success' && github.ref == 'refs/heads/main'
      uses: ncipollo/release-action@v1
      with:
        tag: latest
        name: latest
        files: android/app/build/outputs/apk/release/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
