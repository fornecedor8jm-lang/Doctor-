name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build React App and Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: '18'
          cache: 'npm'

      - name: Install Web Dependencies
        run: npm ci

      - name: Build Web Application
        run: npm run build

      - name: Setup Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor CLI & Platforms
        run: |
          npm install @capacitor/core
          npm install -D @capacitor/cli @capacitor/android

      - name: Initialize Android Platform
        run: |
          npx cap init "Doctor+" "com.cag.doctorstreaming" --web-dir=dist || true
          npx cap add android || true

      - name: Sync Web Assets to Android
        run: npx cap sync

      - name: Build Android Release APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DoctorPlus-Release-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
