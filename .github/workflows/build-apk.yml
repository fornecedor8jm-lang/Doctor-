name: Build APK for Android

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (e.g., 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-levels: 34
          build-tools-version: '34.0.0'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build React app
        run: npm run build
      
      - name: Add Android platform
        run: |
          npx @capacitor/cli add android
        continue-on-error: true
      
      - name: Sync Capacitor
        run: npx @capacitor/cli sync android
      
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease
      
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        continue-on-error: true
      
      - name: Rename APK
        run: |
          VERSION=${{ github.event.inputs.version || '1.0.0' }}
          if [ -f "android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            mv android/app/build/outputs/apk/release/app-release-unsigned.apk doctor-${VERSION}.apk
          elif [ -f "${{ steps.sign_apk.outputs.signedReleaseFile }}" ]; then
            cp "${{ steps.sign_apk.outputs.signedReleaseFile }}" doctor-${VERSION}.apk
          fi
      
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Doctor-APK
          path: doctor-*.apk
      
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: doctor-*.apk
          tag_name: v${{ github.event.inputs.version || '1.0.0' }}
          body: |
            ## 📱 Doctor Streaming APK
            
            Build automático do GitHub Actions
            - **Branch**: ${{ github.ref }}
            - **Commit**: ${{ github.sha }}
            - **Data**: ${{ github.event.head_commit.timestamp }}
            
            ### 📥 Como instalar
            1. Baixe o arquivo APK
            2. Ative "Fontes desconhecidas" no Android
            3. Abra o arquivo APK para instalar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true